<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path d="M32 3 L57 16 L57 35 Q57 53 32 61 Q7 53 7 35 L7 16 Z" fill="url(#shieldGrad)" stroke="#1E40AF" stroke-width="1.5"/>
  <path d="M32 7 L54 18.5 L54 35 Q54 50.5 32 57.5 Q10 50.5 10 35 L10 18.5 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <polyline
    points="12,36 22,36 26,24 30,44 34,20 38,40 42,32 46,36 52,36"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <circle cx="52" cy="36" r="2.5" fill="#93C5FD" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
